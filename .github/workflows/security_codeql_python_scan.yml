name: Security CodeQL Python scan
on:
  workflow_dispatch:
  schedule:
    - cron: "19 8 * * MON-FRI" # Every weekday

jobs:
  security-codeql-python-check:
    permissions:
      contents: read
      actions: read
      security-events: write
    name: Project security CodeQL Python code scan
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_codeql.yml@95c48db64a6d50acd1f8f8a0f93d1019727e5b4d # WORKFLOW_VERSION
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
      languages: python
    secrets: inherit

