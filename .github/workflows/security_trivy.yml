name: Security trivy dependency check

on:
  workflow_dispatch:
  schedule:
    - cron: "19 8 * * MON-FRI" # Every weekday at 08:35 UTC

jobs:
  security-kotlin-trivy-check:
    name: Project security trivy dependency check
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_trivy.yml@95c48db64a6d50acd1f8f8a0f93d1019727e5b4d # WORKFLOW_VERSION 
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
